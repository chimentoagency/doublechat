<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DoubleChat</title>
</head>
<body>
  <div id="app">

    <!-- ── Setup Screen ── -->
    <div id="setup-screen">
      <div class="setup-card">
        <h1>DoubleChat</h1>
        <p class="tagline">Local body-doubling video call</p>

        <div id="role-btns">
          <button id="btn-host" class="setup-btn primary">I'm the Host</button>
          <button id="btn-join" class="setup-btn">I'm Joining</button>
        </div>

        <!-- Host panel -->
        <div id="host-panel" class="panel hidden">
          <button id="btn-back-host" class="back-btn">← Back</button>
          <p class="panel-label">Share one of these addresses with your partner:</p>
          <div id="host-ips"></div>
          <p id="host-wait" class="wait-msg">Waiting for partner to connect...</p>
        </div>

        <!-- Join panel -->
        <div id="join-panel" class="panel hidden">
          <button id="btn-back-join" class="back-btn">← Back</button>
          <label for="host-ip-input">Host's address:</label>
          <div class="join-row">
            <input id="host-ip-input" type="text" placeholder="192.168.1.x:3717" spellcheck="false" />
            <button id="btn-connect" class="setup-btn primary">Connect</button>
          </div>
          <p id="join-error" class="error-msg hidden"></p>
        </div>
      </div>
    </div>

    <!-- ── Call Screen ── -->
    <div id="call-screen" class="hidden">
      <header>
        <span class="logo">DoubleChat</span>
        <span id="call-status" class="status"></span>
      </header>

      <main>
        <div class="video-wrap" id="remote-wrap">
          <video id="remote-video" autoplay playsinline></video>
          <span class="vid-label">Partner</span>
        </div>
        <div class="video-wrap local" id="local-wrap">
          <video id="local-video" autoplay playsinline muted></video>
          <span class="vid-label">You</span>
        </div>
      </main>

      <!-- Settings panel (slides up from controls) -->
      <div id="settings-panel" class="settings-panel hidden">
        <div class="device-row">
          <label for="sel-audio">Microphone</label>
          <select id="sel-audio"></select>
        </div>
        <div class="device-row">
          <label for="sel-video">Camera</label>
          <select id="sel-video"></select>
        </div>
      </div>

      <footer class="controls">
        <button id="btn-mute-mic" class="ctrl-btn">Mute Mic</button>
        <button id="btn-mute-cam" class="ctrl-btn">Stop Video</button>
        <button id="btn-popout"   class="ctrl-btn accent">Pop Out</button>
        <button id="btn-on-top"   class="ctrl-btn">Always on Top: Off</button>
        <button id="btn-settings" class="ctrl-btn">Settings</button>
        <button id="btn-hangup"   class="ctrl-btn danger">Hang Up</button>
      </footer>
    </div>

    <!-- ── Update banner ── -->
    <div id="update-banner" class="hidden">
      <span id="update-msg"></span>
      <button id="btn-restart">Restart to Update</button>
    </div>

  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
