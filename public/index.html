<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DoubleChat</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111827">
</head>
<body>
  <div id="app">
    <header>
      <span class="logo">DoubleChat</span>
      <div id="status" class="status status-waiting">Connecting...</div>
    </header>

    <main>
      <div id="remote-video-container" class="video-wrapper">
        <video id="remote-video" autoplay playsinline></video>
        <span class="video-label">Partner</span>
      </div>
      <div id="local-video-container" class="video-wrapper local">
        <video id="local-video" autoplay playsinline muted></video>
        <span class="video-label">You</span>
      </div>
    </main>

    <footer class="controls">
      <button id="mute-audio" class="ctrl-btn" title="Toggle microphone">Mute Mic</button>
      <button id="mute-video" class="ctrl-btn" title="Toggle camera">Stop Video</button>
      <button id="popout" class="ctrl-btn popout-btn" title="Pop out into floating window">Pop Out</button>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
